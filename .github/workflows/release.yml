name: Release

# Cut a release by pushing a semver tag:
#   npm version 0.3.0 && git push --follow-tags
# publish.yml runs in parallel on the same tag and handles the npm + GitHub Packages publish;
# this workflow just creates the GitHub Release (changelog / release notes).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write # create the release

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          FLAGS="--latest"
          case "$TAG" in *-*) FLAGS="--prerelease" ;; esac
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes $FLAGS
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --title "$TAG" $FLAGS
          fi
