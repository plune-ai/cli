name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Install → Lint → Typecheck → Test → Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        # Skip onnxruntime-node's large CUDA EP download — the bundled CPU build is all we need,
        # and the GPU binding fails to load on CPU-only runners (see .npmrc).
        run: pnpm install --frozen-lockfile
        env:
          ONNXRUNTIME_NODE_INSTALL: skip

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke — built binary + library entry
        run: |
          node dist/cli.cjs --version
          node -e "const m = require('./dist/index.cjs'); if (typeof m.run !== 'function') throw new Error('index.cjs did not export run()');"
